{% extends "base.html" %}

{% block title %}Register - Smart Complaint System{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDEwaDQwdjFIMHpNMCAzMGg0MHYxSDB6TTEwIDB2NDBoLTFWMHpNMzAgMHY0MGgtMVYweiIgZmlsbD0icmdiYSg1OSwgMTMwLCAyNDYsIDAuMDUpIi8+PC9zdmc+')] z-0"></div>
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-xl relative z-10 border border-white border-opacity-60 backdrop-blur-xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Create account</h2>
            <p class="mt-2 text-sm text-slate-500">Join to start tracking your issues</p>
        </div>
        
        <form class="space-y-5" action="{{ url_for('auth.register') }}" method="POST">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <input id="name" name="name" type="text" required class="pl-10 appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition bg-white/70">
                </div>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input id="email" name="email" type="email" autocomplete="email" required class="pl-10 appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition bg-white/70">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input id="password" name="password" type="password" required class="pl-10 appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition bg-white/70">
                </div>
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <input id="confirm_password" name="confirm_password" type="password" required class="pl-10 appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition bg-white/70">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition shadow-md shadow-blue-200 transform hover:-translate-y-0.5">
                    Sign up
                </button>
            </div>
        </form>
        
        <div class="mt-8 text-center text-sm text-slate-500">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="font-semibold text-blue-600 hover:text-blue-500">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
