{% extends "base.html" %}

{% block title %}Submit Request - Smart Complaint System{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="mb-6 flex items-center">
        <a href="{{ url_for('user.dashboard') }}" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 hover:text-slate-700 transition mr-4">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Submit Request</h1>
            <p class="text-slate-500 text-sm mt-1">Please provide details about the issue you are facing.</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 sm:p-8">
        <form action="{{ url_for('user.submit_complaint') }}" method="POST" enctype="multipart/form-data" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Issue Title <span class="text-red-500">*</span></label>
                    <input type="text" name="title" id="title" required placeholder="e.g. Broken AC in Room 204" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                </div>

                <div>
                    <label for="category" class="block text-sm font-medium text-slate-700 mb-1">Category <span class="text-red-500">*</span></label>
                    <select name="category" id="category" required class="w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition bg-white text-slate-700">
                        <option value="" disabled selected>Select a category...</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Water">Water</option>
                        <option value="Internet">Internet</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div>
                    <label for="image" class="block text-sm font-medium text-slate-700 mb-1">Reference Image (Optional)</label>
                    <input type="file" name="image" id="image" accept="image/*" class="w-full rounded-xl border border-slate-200 px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 text-slate-500">
                </div>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Detailed Description <span class="text-red-500">*</span></label>
                <textarea name="description" id="description" rows="5" required placeholder="Describe the issue in detail..." class="w-full rounded-xl border border-slate-200 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition resize-y"></textarea>
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end">
                <a href="{{ url_for('user.dashboard') }}" class="px-6 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 transition mr-3">Cancel</a>
                <button type="submit" class="px-6 py-2.5 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-md shadow-blue-200 transition transform hover:-translate-y-0.5">Submit Ticket</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
